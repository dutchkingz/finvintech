services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finvintech
      POSTGRES_USER: finvintech
      POSTGRES_PASSWORD: finvintech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finvintech"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://finvintech:finvintech@db:5432/finvintech
      DATABASE_URL_ASYNC: postgresql+asyncpg://finvintech:finvintech@db:5432/finvintech
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-ZH9SPKNU4BWTAFAN}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
